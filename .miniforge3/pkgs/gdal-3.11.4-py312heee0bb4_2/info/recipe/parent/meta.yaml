{% set name = "gdal" %}
{% set version = "3.11.4" %}

package:
  name: lib{{ name }}-core
  version: {{ version }}

source:
  url: https://download.osgeo.org/{{ name }}/{{ version }}/{{ name }}-{{ version }}.tar.xz
  sha256: 6401eba2bb63f5ef7a08d2157f240194f06d508d096898a705637aeea9d3bbe8
  patches:
    - patches/000_cmake.patch  # [osx]

build:
  number: 2
  skip_compile_pyc:
    - share/bash-completion/completions/*.py
  ignore_run_exports_from:
    - kealib
    - openjpeg {{ openjpeg }}
    - tiledb
    - libnetcdf
#    - libheif
#    - libadbc-driver-manager  # [not win]
  run_exports:
    # no idea, going with minor pin
    - {{ pin_subpackage('libgdal-core', max_pin='x.x') }}

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - make               # [not win]
    - ninja-base         # [win]
    - pkg-config >=0.21  # [not win]
    - swig
  host:
    - blosc {{ blosc }}
    - expat {{ expat }}
    - geos {{ geos }}
    - geotiff {{ geotiff }}
    - giflib {{ giflib }}  # [not win]
    - jpeg {{ jpeg }}
    - json-c {{ json_c }}  # [not win]
    - lerc {{ lerc }}
    - libarchive {{ libarchive }}
    - libcurl {{ libcurl }}
    - libboost-headers {{ libboost }}
    - libdeflate {{libdeflate }}
    - libiconv {{ libiconv }}
    - libkml {{ libkml }}
    - libpng {{ libpng }}
    - libspatialite {{ libspatialite }}
    - libtiff {{ libtiff }}
    - libwebp-base {{ libwebp }}
    - libxml2 {{ libxml2 }}
    - lz4-c {{ lz4_c }}
    - minizip {{ minizip }}  # [linux]
    - openssl 3.0.18
    - pcre2 {{ pcre2 }}
    - proj {{ proj }}
    # qhull disabled because of https://github.com/conda-forge/qgis-feedstock/issues/284#issuecomment-1356490896
    # - qhull
    - setuptools
    - sqlite {{ sqlite }}
    - xerces-c {{ xerces_c }}
    - xz {{ xz }}
    - zlib {{ zlib }}
    - zstd {{ zstd }}
    # For these plugins, we need the headers for the core sources
    - kealib {{ kealib }}
    - openjpeg {{ openjpeg }}
    - tiledb {{ tiledb }}
    - libnetcdf {{ libnetcdf }}
#    - libheif
#    - libadbc-driver-manager  # [not win]
  run:
    # this should come from run_exports, but somehow it doesn't
    - {{ pin_compatible('jpeg') }}
    - lerc
  run_constrained:
    - libgdal {{ version }}.*

test:
  files:
    - test_data
    - run_test.bat
    - run_test.sh

outputs:
  - name: libgdal-core
    
  - name: libgdal-core-devel
    requirements:
      run:
        - {{ pin_subpackage('libgdal-core', exact=True) }}
        - expat {{ expat }}
        - libkml {{ libkml }}
        - libboost-headers {{ libboost }}

  - name: libgdal-arrow-parquet
    script: build_plugin.sh  # [unix]
    script: build_plugin.bat  # [win]
    requirements:
      build:
        - {{ stdlib("c") }}
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - cmake
        - make        # [unix]
        - ninja-base  # [win]
        - pkg-config  # [not win]
      host:
        - {{ pin_subpackage('libgdal-core-devel', exact=True) }}
        - arrow-cpp {{ arrow_cpp }}
      run:
        - {{ pin_subpackage('libgdal-core', exact=True) }}
    test:
      commands:
        - test -f ${PREFIX}/lib/gdalplugins/ogr_Arrow${SHLIB_EXT}        # [unix]
        - test -f ${PREFIX}/lib/gdalplugins/ogr_Parquet${SHLIB_EXT}      # [unix]
        - if not exist %LIBRARY_LIB%\gdalplugins\ogr_Arrow.dll exit 1    # [win]
        - if not exist %LIBRARY_LIB%\gdalplugins\ogr_Parquet.dll exit 1  # [win]
        - gdalinfo --format Arrow
        - gdalinfo --format Parquet
    about:
      summary: Arrow and Parquet drivers for the Geospatial Data Abstraction Library (GDAL)
      license: MIT
      license_file: LICENSE.TXT

  - name: libgdal-jp2openjpeg
    script: build_plugin.sh  # [unix]
    script: build_plugin.bat  # [win]
    build:
      script_env:
        - GDAL_PLUGIN_NAME=JP2OpenJPEG
        - GDAL_PLUGIN_TYPE=gdal
        - GDAL_PLUGIN_DEPS=-DGDAL_USE_OPENJPEG=ON
    requirements:
      build:
        - {{ stdlib("c") }}
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - cmake
        - make        # [unix]
        - ninja-base  # [win]
        - pkg-config  # [not win]
      host:
        - {{ pin_subpackage('libgdal-core-devel', exact=True) }}
        - openjpeg {{ openjpeg }}
      run:
        - {{ pin_subpackage('libgdal-core', exact=True) }}
    test:
      commands:
        - test -f ${PREFIX}/lib/gdalplugins/${GDAL_PLUGIN_TYPE}_${GDAL_PLUGIN_NAME}${SHLIB_EXT}      # [unix]
        - if not exist %LIBRARY_LIB%\gdalplugins\%GDAL_PLUGIN_TYPE%_%GDAL_PLUGIN_NAME%.dll exit 1    # [win]
        - gdalinfo --format ${GDAL_PLUGIN_NAME}  # [unix]
