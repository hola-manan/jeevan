  - name: libgdal
    build:
      run_exports:
        # no idea, going with minor pin
        - {{ pin_subpackage('libgdal-core', max_pin='x.x') }}
        - {{ pin_subpackage('libgdal', max_pin='x.x') }}
    requirements:
      run:
        - libgdal-core {{ version }}.*
        - libgdal-jp2openjpeg {{ version }}.*
        - libgdal-pdf {{ version }}.*
        - libgdal-postgisraster {{ version }}.*
        - libgdal-pg {{ version }}.*
        - libgdal-fits {{ version }}.*
        - libgdal-xls {{ version }}.*
        - libgdal-grib {{ version }}.*
        - libgdal-kea {{ version }}.*
        - libgdal-tiledb {{ version }}.*
        - libgdal-netcdf {{ version }}.*
        - libgdal-hdf5 {{ version }}.*
        - libgdal-hdf4 {{ version }}.*
#        - libgdal-adbc {{ version }}.*  # [not win]

  - name: gdal
    script: install_python.sh  # [unix]
    script: install_python.bat  # [win]
    build:
      skip_compile_pyc:
        - share/bash-completion/completions/*.py
    requirements:
      build:
        - {{ stdlib("c") }}
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - cmake
        - make        # [unix]
        - ninja-base  # [win]
        - python                                 # [build_platform != target_platform]
        - cross-python_{{ target_platform }}     # [build_platform != target_platform]
        - numpy                                  # [build_platform != target_platform]
        - swig
      host:
        - python
        - pip
        - numpy 2.0.2=*_2 # [py<313]
        - numpy {{ numpy }} # [py>=313]
        - {{ pin_subpackage('libgdal-core-devel', exact=True) }}
        - setuptools >=67.0.0
      run:
        - python
        - libgdal-core {{ version }}.*
    test:
      files:
        - test_data
        - extra_tests.py
        - test_python.py
        - test_script_exist.bat
      requires:
        - python
        - libgdal
      imports:
        - osgeo
        - osgeo.ogr
        - osgeo.gdal
        - osgeo._gdal
        - osgeo._gdalconst
        - osgeo._ogr
        - osgeo._osr
      commands:
        - python test_python.py
        - PYTHONWARNINGS="error" python -c "import osgeo; print(osgeo.__version__)"  # [not win]
        # Check that Python-implemented GDAL utilities are available with .py extension, as documented
        # Temporary disabled on Windows because of https://github.com/OSGeo/gdal/issues/13265#issuecomment-3444896307
        - gdal2tiles.py --help  # [not win]
        - gdal2xyz.py --help  # [not win]
        - gdal_calc.py --help  # [not win]
        - gdal_edit.py --help  # [not win]
        - gdal_fillnodata.py --help  # [not win]
