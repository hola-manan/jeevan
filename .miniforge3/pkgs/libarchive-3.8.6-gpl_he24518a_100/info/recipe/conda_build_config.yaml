CI: github_actions
CONDA_BUILD_SKIP_TESTS: '0'
bzip2: '1'
c_compiler: vs2022
c_stdlib: vs
channel_sources: conda-forge
channel_targets: conda-forge main
cpu_optimization_target: nocona
cran_mirror: https://cran.r-project.org
cxx_compiler: vs2017
extend_keys:
- ignore_version
- ignore_build_only_deps
- pin_run_as_build
- extend_keys
fortran_compiler: gfortran
ignore_build_only_deps:
- numpy
- python
libarchive: '3.8'
liblzma_devel: '5'
libxml2_devel: '2.14'
license_family: gpl
lua: '5'
lz4_c: '1.10'
lzo: '2'
numpy: '1.26'
openssl: '3.5'
perl: 5.26.2
pin_run_as_build:
  python:
    max_pin: x.x
    min_pin: x.x
  r-base:
    max_pin: x.x
    min_pin: x.x
python: '3.12'
r_base: '3.4'
target_platform: win-64
vc: '14'
zlib: '1'
zstd: '1.5'
