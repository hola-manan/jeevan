CI: azure
CONDA_BUILD_SKIP_TESTS: '0'
build_type: release
bzip2: '1'
c_compiler: vs2022
c_stdlib: vs
channel_sources: conda-forge/label/python_rc,conda-forge
channel_targets: conda-forge main
cpu_optimization_target: nocona
cran_mirror: https://cran.r-project.org
cxx_compiler: vs2022
expat: '2'
extend_keys:
- ignore_version
- ignore_build_only_deps
- pin_run_as_build
- extend_keys
fortran_compiler: gfortran
freethreading: 'no'
ignore_build_only_deps:
- numpy
- python
is_python_min: 'no'
libffi: '3.5'
liblzma_devel: '5'
libsqlite: '3'
lua: '5'
numpy: '1.16'
openssl: '3.5'
perl: 5.26.2
pin_run_as_build:
  python:
    max_pin: x.x
    min_pin: x.x
  r-base:
    max_pin: x.x
    min_pin: x.x
python: '3.13'
python_impl: cpython
r_base: '3.4'
target_platform: win-64
tk: '8.6'
vc: '14'
zip_keys:
- - build_type
  - channel_targets
zlib: '1'
