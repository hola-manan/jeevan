version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://jeevn:jeevn@postgres:5432/ashi
      - PYTHONUNBUFFERED=1
    depends_on:
      - postgres
      - minio
    volumes:
      - ./data:/app/data
    networks:
      - ashi

  postgres:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_USER=jeevn
      - POSTGRES_PASSWORD=jeevn
      - POSTGRES_DB=ashi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ashi

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: minio server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - ashi

volumes:
  postgres_data:
  minio_data:

networks:
  ashi:
    driver: bridge
